# Extended feedpak exercising optional side-files: lyrics, vocal pitch,
# song timeline, and a drum tab. See spec/feedpak-v1.md §5 and §7.
# SPDX-License-Identifier: MIT
feedpak_version: "1.13.0"
title: "Extended Demo"
artist: "Example Artist"
album: "Spec Examples"
album_artist: "Various Artists"   # groups a compilation under one album identity (§5.1)
year: 2026
track: 3                          # 1-based album track number, for album playback order (§5.1)
disc: 1
genres:                           # most specific first; genres[0] is the primary genre (§5.1)
  - "Progressive Metal"
  - "Metal"
language: en           # BCP 47 — the song's primary sung language (§5.1)
authors:
  - name: Jane Smith
    role: transcriber
    email: jane@example.com
    url: https://janesmith.example
  - name: Bob Lee
    role: editor
duration: 4.0
arrangements:
  - id: lead
    name: Lead
    file: arrangements/lead.json
    tuning: [0, 0, 0, 0, 0, 0]
    capo: 0
    centOffset: 0.0
  - id: bass
    name: Bass
    file: arrangements/bass.json
    tuning: [0, 0, 0, 0]
    capo: 0
  - id: keys
    name: Keys
    type: piano
    notation: arrangements/notation_keys.json
stems:
  - id: full
    file: stems/full.ogg
    codec: vorbis        # OPTIONAL disambiguation hint; inferred from .ogg when absent
    language: en         # BCP 47 — the sung language carried in this stem (§5.3)
    default: true
lyrics: lyrics.json      # legacy single pointer — the primary (en) track, for pre-1.11.0 readers
lyrics_source: authored
lyric_tracks:            # multi-lingual lyric representations (§5.5)
  - id: en
    file: lyrics.json    # same file the `lyrics` pointer names — the sung original
    language: en
    kind: original
    stem: full
  - id: ja
    file: lyrics_ja.json
    language: ja
    kind: translation
    lyrics_source: transcribed
    lyric_transcription:
      engine: example-mt
      model: demo-translate-1
      version: "1.0.0"
  - id: romaji
    file: lyrics_romaji.json
    language: ja-Latn
    kind: transliteration
vocal_pitch: vocal_pitch.json
vocal_pitch_contour: vocal_pitch_contour.json
song_timeline: song_timeline.json
drum_tab: drum_tab.json
keys: keys.json
harmony: harmony.json
rigs: rigs.json          # engine-agnostic rig library (spec §7.8)
cover: cover.png
