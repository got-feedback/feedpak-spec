site_name: feedpak format specification
site_url: https://got-feedback.github.io/feedpak-spec/
site_description: >-
  An open, hand-editable package format for interactive music notation — tab,
  notation, drums, lyrics, vocal pitch, beats, sections, and audio stems.
repo_url: https://github.com/got-feedback/feedpak-spec
repo_name: got-feedback/feedpak-spec

docs_dir: docs
# Generated pages (docs/feedpak-v1.md, docs/changelog.md, docs/schemas/) are not in
# the nav and the schemas are static JSON; don't fail the build over either.
use_directory_urls: false
validation:
  nav:
    omitted_files: ignore
  links:
    absolute_links: ignore
    not_found: ignore

theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - toc:
      permalink: true
      # GitHub-compatible heading slugs so the spec's many intra-doc
      # "#section" cross-links resolve on the rendered site.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets

nav:
  - Home: index.md
  - Specification: feedpak-v1.md
  - Hand-editing guide: hand-editing.md
  - Changelog: changelog.md

extra:
  # Stamped at build time by the pages/docs workflows (SPEC_VERSION = newest released
  # CHANGELOG version). Rendered by overrides/main.html as the announcement bar, so the
  # site's version is deterministic and never depends on the cached GitHub release widget.
  spec_version: !ENV [SPEC_VERSION, "dev"]
