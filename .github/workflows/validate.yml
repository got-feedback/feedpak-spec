name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pyyaml jsonschema

      - name: Check every schema is a valid JSON Schema (Draft 2020-12)
        run: |
          python - <<'PY'
          import glob, json, sys
          from jsonschema import Draft202012Validator
          bad = False
          for f in sorted(glob.glob("schemas/*.json")):
              try:
                  with open(f, encoding="utf-8") as fh:
                      Draft202012Validator.check_schema(json.load(fh))
                  print("ok  ", f)
              except Exception as exc:
                  bad = True
                  print("FAIL", f, exc)
          sys.exit(1 if bad else 0)
          PY

      - name: Validate example packs against the schemas
        run: python tools/validate.py examples/minimal.feedpak examples/extended.feedpak

      - name: Validate example packs in zip form
        run: |
          python - <<'PY'
          import os, zipfile, tempfile, subprocess, sys
          rc = 0
          for src in ("examples/minimal.feedpak", "examples/extended.feedpak"):
              z = os.path.join(tempfile.mkdtemp(), os.path.basename(src))
              with zipfile.ZipFile(z, "w", zipfile.ZIP_DEFLATED) as zf:
                  for root, _, files in os.walk(src):
                      for fn in files:
                          full = os.path.join(root, fn)
                          zf.write(full, os.path.relpath(full, src).replace("\\", "/"))
              rc |= subprocess.call([sys.executable, "tools/validate.py", z])
          sys.exit(rc)
          PY

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/markdown-link-check.json"
