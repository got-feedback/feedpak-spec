name: pages

# Builds the documentation site with MkDocs Material (light/dark themed) and deploys
# it to GitHub Pages. The JSON Schemas are copied into the site verbatim by
# tools/gen_docs.py, so the schema `$id` / `$ref` URLs
# (https://got-feedback.github.io/feedpak-spec/schemas/*.json) keep resolving.
# The reference validator loads schemas locally and does NOT depend on this.
#
# One-time setup by a maintainer: Settings → Pages → Build and deployment →
# Source: "GitHub Actions". Until that is set, the deploy step will fail.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        run: python -m pip install --upgrade -r requirements-docs.txt

      - name: Assemble docs tree (spec + changelog + schemas)
        run: python tools/gen_docs.py

      - name: Build site
        run: mkdocs build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
